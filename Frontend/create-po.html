<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create PO - Purchase Order System</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark premium-nav shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">PO System</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-light fw-semibold px-4 rounded-pill">Cancel</a>
            </div>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="card premium-card border-0 shadow-sm mx-auto" style="max-width: 900px;">
            <div class="card-body p-5">
                <h2 class="fw-bold mb-4 text-dark">Create Purchase Order</h2>
                
                <div id="alert-container"></div>

                <form id="create-po-form">
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label for="reference_no" class="form-label fw-semibold">Reference Number</label>
                            <input type="text" class="form-control premium-input" id="reference_no" placeholder="Enter Reference No" required>
                        </div>
                        <div class="col-md-6">
                            <label for="vendor_id" class="form-label fw-semibold">Vendor</label>
                            <select class="form-select premium-input" id="vendor_id" required>
                                <option value="" disabled selected>Select a vendor...</option>
                            </select>
                        </div>
                    </div>

                    <hr class="my-4 text-muted">

                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="fw-bold mb-0">Products</h4>
                        <button type="button" class="btn btn-primary rounded-pill fw-semibold shadow-sm px-4" id="add-product-btn">
                            + Add Product
                        </button>
                    </div>

                    <div id="product-list-container">
                    </div>

                    <div class="row justify-content-end mt-4">
                        <div class="col-md-5">
                            <div class="card bg-light border-0 shadow-sm">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted fw-semibold">Subtotal:</span>
                                        <span class="fw-bold text-dark" id="summary-subtotal">$0.00</span>
                                    </div>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="text-muted fw-semibold">Tax (5%):</span>
                                        <span class="fw-bold text-dark" id="summary-tax">$0.00</span>
                                    </div>
                                    <hr class="text-muted">
                                    <div class="d-flex justify-content-between">
                                        <span class="fw-bold fs-5 text-dark">Total:</span>
                                        <span class="fw-bold fs-5 text-primary" id="summary-total">$0.00</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 text-end">
                        <button type="submit" class="btn btn-success btn-lg rounded-pill fw-bold shadow px-5" id="submit-po-btn">
                            Submit Purchase Order
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <template id="product-row-template">
        <div class="row align-items-end mb-3 product-row bg-white p-3 rounded shadow-sm border">
            <div class="col-md-5 mb-2 mb-md-0">
                <label class="form-label fw-semibold text-muted small mb-1">Product</label>
                <select class="form-select product-select premium-input" required>
                    <option value="" disabled selected>Select product...</option>
                </select>
            </div>
            <div class="col-md-3 mb-2 mb-md-0">
                <label class="form-label fw-semibold text-muted small mb-1">Quantity</label>
                <input type="number" class="form-control quantity-input premium-input" min="1" placeholder="1" required>
            </div>
            <div class="col-md-3 mb-2 mb-md-0">
                <label class="form-label fw-semibold text-muted small mb-1">Price</label>
                <div class="input-group">
                    <span class="input-group-text bg-light text-muted border-0 shadow-none px-3">$</span>
                    <input type="number" step="0.01" class="form-control price-input bg-light border-0 shadow-none ps-0" readonly placeholder="Auto-filled" required>
                </div>
            </div>
            <div class="col-md-1 text-end">
                <button type="button" class="btn btn-outline-danger remove-product-btn px-3 rounded" title="Remove">
                    &times;
                </button>
            </div>
        </div>
    </template>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initCreatePO);
    </script>
</body>
</html>
